{% extends "base.html" %}
{% block content %}
<h1>Heads up</h1>
<p class="bad-box">{{ message }}</p>
<p class="muted">{{ hint }}</p>
{% if subject %}<p><a href="{{ url_for('subject_home', subject=subject) }}">← back to {{ subject }}</a></p>
{% else %}<p><a href="{{ url_for('index') }}">← home</a></p>{% endif %}
{% endblock %}
